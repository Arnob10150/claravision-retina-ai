<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eye Exam CSS Animation - Brand Color</title>
  <style>
    :root {
      --bg: #efefed;
      --ink: #102020;
      --brand: #0F6E56;
      --brand-light: #33a486;
      --brand-dark: #063d30;
      --pupil: #071919;
      --vein: #0F6E56;
      --drop: #0F6E56;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 0;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: min(732px, 100%);
      margin: 0 auto;
      background: var(--bg);
    }

    .original-art {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      pointer-events: none;
    }

    .motion-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .floor-trace {
      stroke-dasharray: 655;
      stroke-dashoffset: 655;
      animation: drawFloor 1s ease-out forwards;
    }

    .eye-breath {
      transform-box: fill-box;
      transform-origin: center;
      animation: eyeBreath 3.6s ease-in-out infinite;
    }

    .iris-group {
      transform-box: fill-box;
      transform-origin: center;
      animation: irisLook 4.2s ease-in-out infinite;
    }

    .pupil {
      transform-box: fill-box;
      transform-origin: center;
      animation: pupilPulse 2.6s ease-in-out infinite;
    }

    .highlight {
      transform-box: fill-box;
      transform-origin: center;
      animation: highlightFloat 3.8s ease-in-out infinite;
    }

    .pulse-ring {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: scanPulse 3.4s ease-in-out infinite;
    }

    .vein {
      stroke-dasharray: 75;
      stroke-dashoffset: 75;
      animation: veinTrace 3.1s ease-in-out infinite;
    }

    .vein.v2 { animation-delay: .35s; }
    .vein.v3 { animation-delay: .7s; }
    .vein.v4 { animation-delay: 1s; }

    .drop {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: dropFall 2.9s ease-in-out infinite;
    }

    .drop.d2 { animation-delay: .18s; }
    .drop.d3 { animation-delay: .36s; }

    @keyframes drawFloor {
      to { stroke-dashoffset: 0; }
    }

    @keyframes eyeBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.012); }
    }

    @keyframes irisLook {
      0%, 100% { transform: translate(0, 0); }
      24% { transform: translate(-5px, -3px); }
      54% { transform: translate(5px, 4px); }
      76% { transform: translate(1px, -5px); }
    }

    @keyframes pupilPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(.91); }
    }

    @keyframes highlightFloat {
      0%, 100% { transform: translate(0, 0); opacity: .42; }
      50% { transform: translate(6px, 4px); opacity: .28; }
    }

    @keyframes scanPulse {
      0% { opacity: 0; transform: scale(.76); }
      38% { opacity: .44; }
      100% { opacity: 0; transform: scale(1.12); }
    }

    @keyframes veinTrace {
      0%, 100% { stroke-dashoffset: 75; opacity: .16; }
      45%, 72% { stroke-dashoffset: 0; opacity: .66; }
    }

    @keyframes dropFall {
      0%, 35% { opacity: 0; transform: translate(0, 0) scale(.7); }
      48% { opacity: .95; }
      100% { opacity: 0; transform: translate(-82px, 88px) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
